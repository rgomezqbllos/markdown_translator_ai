<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalBus Markdown Translator AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">✨</span>
                <h1>GoalBus Translator <span class="badge">Local AI</span></h1>
            </div>
            <p class="subtitle">Traducción de Markdown con Soporte Cloud (iCloud/OneDrive)</p>
        </header>

        <!-- Main Form -->
        <main class="main-content">
            <div class="glass-panel form-panel">
                <div class="form-group">
                    <label for="input_dir">Directorio de Entrada (.md files)</label>
                    <div class="input-with-btn">
                        <input type="text" id="input_dir" placeholder="Selecciona la carpeta origen..." readonly>
                        <button class="browse-btn" data-target="input_dir">Explorar</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="output_dir">Directorio de Salida</label>
                    <div class="input-with-btn">
                        <input type="text" id="output_dir" placeholder="Selecciona la carpeta destino..." readonly>
                        <button class="browse-btn" data-target="output_dir">Explorar</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="model_select">Modelo de IA (Motor)</label>
                    <select id="model_select">
                        <!-- JS fills this -->
                    </select>
                </div>

                <div class="lang-row">
                    <div class="form-group">
                        <label for="source_lang">Idioma Origen</label>
                        <select id="source_lang">
                            <!-- JS fills this -->
                        </select>
                    </div>
                    
                    <div class="switch-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M11 18l-4 4-4-4"/><path d="M17 14V2"/><path d="M13 6l4-4 4 4"/></svg>
                    </div>

                    <div class="form-group">
                        <label for="target_lang">Idioma Destino</label>
                        <select id="target_lang">
                            <!-- JS fills this -->
                        </select>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="translate_btn" class="primary-btn">
                        <span class="btn-text">Iniciar Traducción</span>
                        <span class="btn-loader" style="display: none;"></span>
                    </button>
                    
                    <button id="stop_btn" class="danger-btn" style="display: none;">
                        <span class="btn-text">Detener</span>
                    </button>
                </div>
            </div>

            <!-- Terminal Output -->
            <div class="glass-panel console-panel">
                <div class="console-header">
                    <div class="window-controls">
                        <span></span><span></span><span></span>
                    </div>
                    <span class="console-title">Registro de Proceso</span>
                </div>
                <div class="console-body" id="console_output">
                    <div class="log-line info">Esperando para iniciar...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
